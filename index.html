<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로봇이 아닙니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8eaf0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 0;
  }

  /* ── 전체 카드 ── */
  .card {
    background: #fff;
    width: min(318px, calc(100vw - 40px));
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22), 0 1px 6px rgba(0,0,0,0.12);
    position: relative;
    padding: 8px;
  }

  /* ── 파란 헤더 ── */
  .header {
    background: #4a90d9;
    padding: 18px 20px 16px 20px;
    border-radius: 2px 2px 0 0;
  }

  .header-title {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
    cursor: text;
    outline: none;
    display: inline-block;
    min-width: 40px;
  }

  .header-title:focus {
    border-bottom: 2px solid rgba(255,255,255,0.6);
  }

  .header-desc {
    font-size: 11.5px;
    color: #fff;
    line-height: 1.55;
    font-weight: 400;
    opacity: 0.97;
  }

  /* ── 3×3 그리드 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    background: #fff;
    margin-top: 4px;
  }

  .cell {
    position: relative;
    aspect-ratio: 1;
    background: #d8dce4;
    overflow: hidden;
    cursor: pointer;
  }

  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.18s ease;
  }

  .cell:hover img { transform: scale(1.05); }

  .cell-empty {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    color: #9aa3b0;
    transition: background 0.15s, color 0.15s;
  }

  .cell:hover .cell-empty {
    background: #cdd4de;
    color: #4a90d9;
  }

  .cell-empty svg { width: 24px; height: 24px; }
  .cell-empty span { font-size: 10px; font-weight: 500; }

  /* delete X */
  .cell-del {
    position: absolute;
    top: 3px; right: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.52);
    border: none;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .cell:hover .cell-del { display: flex; }
  .cell-del:hover { background: rgba(210,30,30,0.8); }

  /* drag-over */
  .cell.drag-over::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 3px dashed #4a90d9;
    z-index: 4;
    pointer-events: none;
  }

  /* ── 하단 푸터 ── */
  .footer {
    display: flex;
    align-items: center;
    padding: 6px 0 0 4px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    gap: 2px;
    margin: 6px -8px -8px -8px;
    padding-bottom: 8px;
    overflow: hidden;
    border-radius: 0 0 4px 4px;
  }

  .icon-btn {
    width: 44px; height: 44px;
    border: none; background: transparent;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #666;
    transition: background 0.14s, color 0.14s;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: #e8f0fe; color: #4a90d9; }
  .icon-btn svg { width: 26px; height: 26px; }

  .footer-spacer { flex: 1; }

  .btn-confirm {
    background: #4a90d9;
    color: #fff;
    border: none;
    padding: 11px 22px;
    border-radius: 4px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.1px;
    transition: background 0.14s, box-shadow 0.14s;
    flex-shrink: 0;
    align-self: center;
    margin-right: 8px;
  }

  .btn-confirm:hover {
    background: #2f78c5;
    box-shadow: 0 2px 8px rgba(74,144,217,0.4);
  }

  /* ── 셀 닉네임 오버레이 ── */
  .cell-nick-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 3px 5px;
    background: transparent;
    z-index: 3;
    display: flex;
    align-items: center;
  }
  .cell-nick-wrap.has-text {
    background: linear-gradient(transparent, rgba(0,0,0,0.45));
  }
  .cell-nick-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 8px;
    font-family: inherit;
    font-weight: 600;
    text-shadow: none;
    padding: 0;
    line-height: 1.4;
    cursor: text;
  }
  .cell-nick-input::placeholder { color: rgba(255,255,255,0.55); font-weight: 400; }

  /* ── saving overlay ── */
  .saving {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.78);
    align-items: center;
    justify-content: center;
    z-index: 30;
    font-size: 14px;
    font-weight: 600;
    color: #4a90d9;
    gap: 10px;
  }
  .saving.show { display: flex; }
  .spin {
    width: 19px; height: 19px;
    border: 2.5px solid #cce0f5;
    border-top-color: #4a90d9;
    border-radius: 50%;
    animation: sp 0.7s linear infinite;
  }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* ── 색상 설정 패널 ── */
  .color-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: min(318px, calc(100vw - 40px));
    background: #fff;
    border-radius: 8px;
    padding: 9px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    margin-bottom: 12px;
  }

  .color-panel label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  input[type=color] {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border: 2px solid #dde2ea;
    border-radius: 6px;
    padding: 2px;
    cursor: pointer;
    background: transparent;
    flex-shrink: 0;
  }

  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 3px; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }

  .color-panel.hidden { display: none; }

  /* ── 커미션주 닉네임 입력 ── */
  #nick-panel {
    margin-top: -6px;
    justify-content: flex-start;
  }
  #nick-input {
    flex: 1;
    min-width: 0;
    border: 2px solid #dde2ea;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 16px;
    font-family: inherit;
    color: #555;
    outline: none;
    transition: border-color 0.14s;
  }
  #nick-input:focus { border-color: #4a90d9; }
  #nick-input::placeholder { color: #b5bcc7; }

  /* ── toast ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #303134;
    color: #fff;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s, transform 0.22s;
    white-space: nowrap;
    z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* ── iOS 이미지 미리보기 모달 ── */
  .img-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    padding: 20px;
  }
  .img-modal.show { display: flex; }
  .img-modal img { max-width: 100%; max-height: 75vh; border-radius: 6px; }
  .img-modal p { color: #fff; font-size: 13px; text-align: center; }
  .img-modal button {
    padding: 9px 24px; border: none; border-radius: 6px;
    background: #fff; color: #333; font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer;
  }

  /* ── 자르기 모달 ── */
  .crop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .crop-overlay.show { display: flex; }

  .crop-box {
    position: relative;
    overflow: hidden;
    background: #000;
    cursor: grab;
    user-select: none;
    touch-action: none;
    width: 300px;
    height: 300px;
  }
  .crop-box.grabbing { cursor: grabbing; }
  .crop-box canvas { display: block; width: 300px; height: 300px; }
  .crop-box .crop-frame {
    position: absolute;
    inset: 0;
    border: 2px solid rgba(255,255,255,0.8);
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }

  .crop-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .crop-btn {
    padding: 9px 22px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .crop-btn.confirm { background: #4a90d9; color: #fff; }
  .crop-btn.cancel  { background: #fff; color: #333; }

  .crop-zoom {
    display: flex; align-items: center; gap: 8px;
    color: #fff; font-size: 13px;
  }
  .btn-save-panel {
    background: #4a90d9;
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.14s;
    margin-left: 4px;
  }
  .btn-save-panel:hover { background: #2f78c5; }
</style>
</head>
<body>

<!-- 색상 조정 패널 (카드 위) -->
<div class="color-panel" id="color-panel">
  <label for="pick-color">색상</label>
  <input type="color" id="pick-color" value="#4a90d9" oninput="applyColor()">
  <div style="flex:1"></div>
  <button class="btn-save-panel" onclick="saveImage()">저장하기</button>
</div>


<div id="capture-wrapper" style="display:inline-block;">
<div class="card" id="card">

  <!-- 파란 헤더 -->
  <div class="header">
    <div class="header-title" id="title" contenteditable="true" spellcheck="false">페어</div>
    <div class="header-desc"><span id="desc-line1" contenteditable="true" spellcheck="false" style="outline:none; border-bottom: 1px solid rgba(255,255,255,0.4); cursor:text;">가 있는 이미지를 모두 선택하세요.</span><br>위의 조건과 일치하는 새 이미지를 모두 선택했으면<br>확인을 클릭하세요.</div>
  </div>

  <!-- 3×3 그리드 -->
  <div class="grid" id="grid"></div>

  <!-- 푸터 -->
  <div class="footer">
    <!-- 새로고침 -->
    <button class="icon-btn" onclick="clearAll()" title="초기화">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
    <!-- 헤드폰 -->
    <button class="icon-btn" title="오디오">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3C7.03 3 3 7.03 3 12v4c0 1.1.9 2 2 2h1c1.1 0 2-.9 2-2v-3c0-1.1-.9-2-2-2H5.07C5.56 7.19 8.48 5 12 5s6.44 2.19 6.93 6H17c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h1c1.1 0 2-.9 2-2v-4c0-4.97-4.03-9-9-9z"/></svg>
    </button>
    <!-- 정보 -->
    <button class="icon-btn" title="정보">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    </button>

    <div class="footer-spacer"></div>
    <button class="btn-confirm" onclick="saveImage()">확인</button>
  </div>

  <div class="saving" id="saving"><div class="spin"></div>저장 중…</div>
</div>
</div>

<!-- iOS 이미지 미리보기 모달 -->
<div class="img-modal" id="img-modal">
  <img id="img-modal-img" src="" alt="">
  <p>이미지를 길게 눌러 저장하세요</p>
  <button onclick="document.getElementById('img-modal').classList.remove('show')">닫기</button>
</div>

<!-- 자르기 모달 -->
<div class="crop-overlay" id="crop-overlay">
  <div class="crop-box" id="crop-box">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-frame"></div>
  </div>
  <div class="crop-zoom">
    <span>축소</span>
    <input type="range" id="crop-zoom-range" min="100" max="300" value="100" step="1">
    <span>확대</span>
  </div>
  <div class="crop-controls">
    <button class="crop-btn cancel" onclick="closeCrop()">취소</button>
    <button class="crop-btn confirm" onclick="confirmCrop()">자르기 완료</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  let cells = Array.from({ length: 9 }, () => ({ src: null, cropped: null, nick: '' }));

  // ── 렌더 ──
  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cells.forEach((cell, i) => {
      const div = document.createElement('div');
      div.className = 'cell';

      if (cell.src) {
        const img = document.createElement('img');
        img.src = cell.cropped || cell.src;
        div.appendChild(img);

        const del = document.createElement('button');
        del.className = 'cell-del';
        del.textContent = '×';
        del.onclick = e => { e.stopPropagation(); cells[i] = { src: null, cropped: null, nick: '' }; render(); };
        div.appendChild(del);

        // 자르기 버튼
        const cropBtn = document.createElement('button');
        cropBtn.className = 'cell-del';
        cropBtn.textContent = '✂';
        cropBtn.style.cssText = 'right:28px; background:rgba(0,0,0,0.55);';
        cropBtn.onclick = e => { e.stopPropagation(); openCrop(i); };
        div.appendChild(cropBtn);

        // 닉네임 입력 오버레이
        const nickWrap = document.createElement('div');
        nickWrap.className = 'cell-nick-wrap';
        if (cell.nick) nickWrap.classList.add('has-text');
        const nickInput = document.createElement('input');
        nickInput.type = 'text';
        nickInput.className = 'cell-nick-input';
        nickInput.placeholder = '커미션주';
        nickInput.maxLength = 20;
        nickInput.value = cell.nick || '';
        nickInput.addEventListener('input', e => {
          cells[i].nick = e.target.value;
          nickWrap.classList.toggle('has-text', !!e.target.value);
        });
        nickInput.addEventListener('click', e => e.stopPropagation());
        nickWrap.appendChild(nickInput);
        div.appendChild(nickWrap);
      } else {
        const em = document.createElement('div');
        em.className = 'cell-empty';
        div.appendChild(em);
      }

      div.addEventListener('click', () => { if (!cell.src) upload(i); });
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
      div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
      div.addEventListener('drop', e => {
        e.preventDefault(); div.classList.remove('drag-over');
        const f = e.dataTransfer.files[0];
        if (f && f.type.startsWith('image/')) read(f, i);
      });

      grid.appendChild(div);
    });
  }

  function upload(i) {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = () => { if (inp.files[0]) read(inp.files[0], i); };
    inp.click();
  }

  function read(file, i) {
    const r = new FileReader();
    r.onload = e => { cells[i] = { src: e.target.result, cropped: null }; openCrop(i); };
    r.readAsDataURL(file);
  }

  function clearAll() {
    cells = cells.map(() => ({ src: null, cropped: null, nick: '' })); render();
    toast('초기화했어요');
  }

  // ── 자르기 ──
  let cropIdx = -1;
  let cropImg = new Image();
  let cropX = 0, cropY = 0, cropZoom = 1;
  let dragStart = null;
  const BOX = 600; // 고해상도 크롭을 위해 2배 크기

  function openCrop(i) {
    cropIdx = i;
    cropImg = new Image();
    cropImg.onload = () => {
      const iw = cropImg.naturalWidth;
      const ih = cropImg.naturalHeight;
      // 이미지가 BOX 안에 딱 들어오도록 초기 zoom 계산
      cropZoom = Math.max(BOX / iw, BOX / ih);
      // 가운데 정렬
      cropX = (BOX - iw * cropZoom) / 2;
      cropY = (BOX - ih * cropZoom) / 2;
      document.getElementById('crop-zoom-range').min = Math.round(cropZoom * 100);
      document.getElementById('crop-zoom-range').max = Math.round(cropZoom * 100 * 3);
      document.getElementById('crop-zoom-range').value = Math.round(cropZoom * 100);
      drawCrop();
      document.getElementById('crop-overlay').classList.add('show');
    };
    cropImg.src = cells[i].src;
  }

  function drawCrop() {
    const canvas = document.getElementById('crop-canvas');
    canvas.width = BOX; canvas.height = BOX;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, BOX, BOX);
    const iw = cropImg.naturalWidth * cropZoom;
    const ih = cropImg.naturalHeight * cropZoom;
    ctx.drawImage(cropImg, cropX, cropY, iw, ih);
  }

  function closeCrop() {
    document.getElementById('crop-overlay').classList.remove('show');
    if (cropIdx >= 0 && !cells[cropIdx].cropped) render();
    cropIdx = -1;
  }

  function confirmCrop() {
    const canvas = document.getElementById('crop-canvas');
    cells[cropIdx].cropped = canvas.toDataURL('image/png');
    document.getElementById('crop-overlay').classList.remove('show');
    cropIdx = -1;
    render();
  }

  // 크롭 박스 표시 크기(300) vs 캔버스 실제 크기(600)의 비율
  const CROP_DISPLAY = 300;
  const CROP_RATIO = BOX / CROP_DISPLAY; // 2

  // 드래그
  const cropBox = document.getElementById('crop-box');
  cropBox.addEventListener('mousedown', e => {
    dragStart = { x: e.clientX * CROP_RATIO - cropX, y: e.clientY * CROP_RATIO - cropY };
    cropBox.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e => {
    if (!dragStart) return;
    cropX = e.clientX * CROP_RATIO - dragStart.x;
    cropY = e.clientY * CROP_RATIO - dragStart.y;
    drawCrop();
  });
  window.addEventListener('mouseup', () => { dragStart = null; cropBox.classList.remove('grabbing'); });

  // 터치
  cropBox.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragStart = { x: t.clientX * CROP_RATIO - cropX, y: t.clientY * CROP_RATIO - cropY };
  });
  cropBox.addEventListener('touchmove', e => {
    if (!dragStart) return;
    e.preventDefault();
    const t = e.touches[0];
    cropX = t.clientX * CROP_RATIO - dragStart.x;
    cropY = t.clientY * CROP_RATIO - dragStart.y;
    drawCrop();
  }, { passive: false });
  cropBox.addEventListener('touchend', () => { dragStart = null; });

  // 줌
  document.getElementById('crop-zoom-range').addEventListener('input', function() {
    const cx = BOX / 2, cy = BOX / 2;
    const prevZoom = cropZoom;
    cropZoom = this.value / 100;
    // 중심 기준으로 zoom
    cropX = cx - (cx - cropX) * (cropZoom / prevZoom);
    cropY = cy - (cy - cropY) * (cropZoom / prevZoom);
    drawCrop();
  });

  // ── 저장 ──
  async function saveImage() {
    const ov = document.getElementById('saving');
    const panel = document.getElementById('color-panel');
    const descLine = document.getElementById('desc-line1');
    panel.classList.add('hidden');
    descLine.style.borderBottom = 'none';
    document.querySelectorAll('.cell-del').forEach(b => b.style.display = 'none');
    ov.style.position = 'fixed'; ov.style.inset = '0'; ov.style.borderRadius = '0';
    ov.classList.add('show');
    try {
      await new Promise(r => setTimeout(r, 40));
      ov.classList.remove('show');
      await new Promise(r => setTimeout(r, 30));

      // 카드 실제 크기 측정
      const card = document.getElementById('card');
      const cardRect = card.getBoundingClientRect();
      const SCALE = 3;
      const PAD = 32;
      const CW = (cardRect.width + PAD * 2) * SCALE;
      const CH = (cardRect.height + PAD * 2) * SCALE;

      const final = document.createElement('canvas');
      final.width = CW; final.height = CH;
      const ctx = final.getContext('2d');

      // 흰 배경
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, CW, CH);

      // 저장 전에 각 셀 img를 canvas로 미리 변환 (iOS naturalWidth=0 문제 방지)
      // 닉네임도 함께 합성
      const cellEls = card.querySelectorAll('.cell');
      const originalSrcs = [];
      cellEls.forEach((cell, idx) => {
        const img = cell.querySelector('img');
        if (!img) { originalSrcs.push(null); return; }
        originalSrcs.push(img.src);
        const cellW = cell.offsetWidth || 96;
        const cellH = cell.offsetHeight || 96;
        const iw = img.naturalWidth, ih = img.naturalHeight;
        if (!iw || !ih) { originalSrcs[originalSrcs.length-1] = null; return; }
        // SCALE 배율로 고해상도 캔버스 생성
        const cW = cellW * SCALE, cH = cellH * SCALE;
        const sc = Math.max(cW / iw, cH / ih);
        const dw = iw * sc, dh = ih * sc;
        const ox = (cW - dw) / 2, oy = (cH - dh) / 2;
        const c = document.createElement('canvas');
        c.width = cW; c.height = cH;
        const cx = c.getContext('2d');
        cx.imageSmoothingEnabled = true;
        cx.imageSmoothingQuality = 'high';
        cx.drawImage(img, ox, oy, dw, dh);

        // 닉네임 오버레이 합성
        const nick = cells[idx] ? cells[idx].nick : '';
        if (nick) {
          const fontSize = Math.max(7, cW * 0.08);
          const gradH = fontSize * 2.4;
          const grad = cx.createLinearGradient(0, cH - gradH, 0, cH);
          grad.addColorStop(0, 'rgba(0,0,0,0)');
          grad.addColorStop(1, 'rgba(0,0,0,0.48)');
          cx.fillStyle = grad;
          cx.fillRect(0, cH - gradH, cW, gradH);
          cx.fillStyle = '#fff';
          cx.font = `600 ${fontSize}px 'Noto Sans KR', sans-serif`;
          cx.textAlign = 'left';
          cx.textBaseline = 'bottom';
          cx.fillText(nick, 5 * SCALE, cH - 4 * SCALE, (cW - 10 * SCALE));
        }

        img.src = c.toDataURL('image/png');
        img.style.objectFit = 'fill';
      });

      // html2canvas로 카드만 캡처
      const cvs = await html2canvas(card, {
        scale: SCALE,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#fff',
        logging: false,
        imageTimeout: 0,
        onclone: (doc) => {
          // SVG 아이콘에 명시적 크기·색상 부여
          doc.querySelectorAll('.icon-btn svg').forEach(svg => {
            svg.setAttribute('width', '26');
            svg.setAttribute('height', '26');
            svg.querySelectorAll('path').forEach(p => p.setAttribute('fill', '#666'));
          });
          // 카드 외곽선
          doc.getElementById('card').style.border = '1px solid #d0d0d0';
        }
      });

      // img src 원복
      cellEls.forEach((cell, idx) => {
        const img = cell.querySelector('img');
        if (!img || !originalSrcs[idx]) return;
        img.src = originalSrcs[idx];
        img.style.objectFit = 'cover';
      });

      // 카드 이미지를 여백 포함 최종 canvas에 그리기
      ctx.drawImage(cvs, PAD * SCALE, PAD * SCALE);

      const dataUrl = final.toDataURL('image/png');
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) {
        document.getElementById('img-modal-img').src = dataUrl;
        document.getElementById('img-modal').classList.add('show');
      } else {
        const a = document.createElement('a');
        a.download = '로봇이 아닙니다.png';
        a.href = dataUrl;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
      toast('저장 완료!');
    } catch(e) { console.error(e); toast('저장 실패'); }
    document.querySelectorAll('.cell-del').forEach(b => b.style.display = '');
    descLine.style.borderBottom = '1px solid rgba(255,255,255,0.4)';
    ov.style.position = ''; ov.style.inset = ''; ov.style.borderRadius = '';
    ov.classList.remove('show');
    panel.classList.remove('hidden');
  }

  function applyColor() {
    const c = document.getElementById('pick-color').value;
    document.querySelector('.header').style.background = c;
    document.querySelector('.btn-confirm').style.background = c;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  render();
</script>
</body>
</html>
